<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>英単語タイピング 完全改良版</title>
<style>
body{ text-align:center; font-family:sans-serif; margin:0; padding:0; background-color:#f0f8ff;}
h1{ font-size:60px; color:#333; margin-top:20px;}
#word{ font-size:70px; margin:30px; color:#007acc; transition: all 0.2s;}
input, select, button{ font-size:28px; padding:12px; text-align:center; margin:10px; border-radius:8px;}
button{ cursor:pointer;}
#score, #timer, #combo, #level{ font-size:40px; margin:15px;}
#combo{ color:#d2691e; }
#level{ color:#228b22; }
.correctEffect{ color:#32cd32; transform: scale(1.2);}
.wrongEffect{ color:#ff4500; transform: scale(1.2);}
#gameArea, #reviewArea{ display:none; width:100%; max-width:900px; margin:auto;}
#shareBtns button{ margin:5px; font-size:22px; padding:8px 15px;}
#description{ font-size:24px; color:#555; margin:10px;}
</style>
</head>
<body>

<h1>英単語タイピング</h1>

<!-- 設定画面 -->
<div id="setupArea">
  <div>
    <label>コース選択：</label>
    <select id="courseSelect">
      <option value="easy">初級コース</option>
      <option value="medium">中級コース</option>
      <option value="hard">上級コース</option>
    </select>
  </div>
  <div>
    <label>テーマ選択：</label>
    <select id="themeSelect">
      <option value="daily">日常英単語</option>
      <option value="game">ゲーム用英単語</option>
      <option value="business">ビジネス英単語</option>
    </select>
  </div>
  <div>
    <label>制限時間（秒）：</label>
    <input type="number" id="timeInput" value="60" min="10" max="600">
  </div>
  <div>
    <label>ゲームモード：</label>
    <select id="modeSelect">
      <option value="normal">ノーマルモード</option>
      <option value="challenge">チャレンジモード</option>
    </select>
  </div>
  <div id="description">
    <p><strong>チャレンジモードのルール:</strong> 10コンボごとに+5秒タイムボーナス！速く正確に打ってコンボを稼ごう！</p>
  </div>
  <div>
    <button id="startBtn">スタート準備</button>
    <p>スペースキーでゲーム開始</p>
  </div>
</div>

<!-- ゲーム画面 -->
<div id="gameArea">
  <div id="timer">残り時間:60</div>
  <div id="score">スコア:0</div>
  <div id="combo">コンボ:0</div>
  <div id="level">コース:初級</div>
  <div id="word">スペースでスタート</div>
  <input id="input" placeholder="ここに入力" autofocus autocomplete="off" disabled>
  <div id="startHint">スペースキーでゲーム開始</div>
  <div id="shareBtns">
    <button onclick="shareLINE()">LINEでシェア</button>
    <button onclick="shareX()">Xでシェア</button>
    <button onclick="shareCopy()">コピー</button>
  </div>
</div>

<!-- 復習画面 -->
<div id="reviewArea">
  <h2>間違えた単語の復習</h2>
  <ul id="mistakesList"></ul>
  <button onclick="restartGame()">もう一度プレイ</button>
</div>

<script>
// 単語リスト（コース別・テーマ別・日替わり用）
let wordBank = {
  easy:{daily:["act","add","ask","use","win","run","go","play","see","eat"], game:["jump","level","boss","quest","coin","attack","defend","magic","score","item"], business:["meet","plan","call","task","note","deal","order","save","hire","report"]},
  medium:{daily:["ability","accept","achieve","admit","affect","agree","allow","appear","apply","argue"], game:["upgrade","strategy","challenge","enemy","reward","skill","damage","puzzle","battle","team"], business:["develop","manage","improve","project","budget","report","market","invest","review","deliver"]},
  hard:{daily:["establish","develop","discover","educate","improve","increase","influence","maintain","produce","understand"], game:["congratulation","achievement","environment","competition","mechanics","technique","interface","experience","multiplayer","campaign"], business:["negotiation","corporation","innovation","entrepreneur","investment","leadership","consulting","acquisition","performance","management"]}
};

let currentWord="", score=0, combo=0, time=60;
let timerRunning=false, intervalID, charIndex=0;
let course="easy", theme="daily", mode="normal";
let mistakes = [];
let dailySeed = new Date().toISOString().slice(0,10);

// 日替わり単語取得
function getDailyWordList(list){
  let seed = dailySeed.split('-').join('');
  let start = parseInt(seed.slice(-2)) % list.length;
  let newList = [];
  for(let i=0;i<list.length;i++){
    newList.push(list[(start+i)%list.length]);
  }
  return newList;
}

// スタート準備
document.getElementById("startBtn").addEventListener("click", function(){
  course = document.getElementById("courseSelect").value;
  theme = document.getElementById("themeSelect").value;
  mode = document.getElementById("modeSelect").value;
  time = parseInt(document.getElementById("timeInput").value) || 60;
  document.getElementById("setupArea").style.display="none";
  document.getElementById("gameArea").style.display="block";
  document.getElementById("timer").textContent="残り時間:"+time;
  document.getElementById("level").textContent="コース:"+document.getElementById("courseSelect").selectedOptions[0].text;
  document.getElementById("input").disabled=true;
  document.getElementById("input").focus();
  document.getElementById("word").textContent="スペースでスタート";
});

// 単語取得
function getWord(){
  let list = wordBank[course][theme];
  list = getDailyWordList(list);
  let rand = Math.floor(Math.random()*list.length);
  return list[rand];
}

// 新しい単語
function newWord(){
  currentWord = getWord();
  charIndex=0;
  document.getElementById("word").textContent=currentWord;
  document.getElementById("input").value="";
  document.getElementById("word").className="";
  document.getElementById("input").focus();
}

// 入力チェック
document.getElementById("input").addEventListener("input", function(e){
  let val = e.target.value;
  if(val[charIndex] === currentWord[charIndex]){
    charIndex++;
    document.getElementById("word").className="correctEffect";
    setTimeout(()=>{document.getElementById("word").className="";},150);
    if(charIndex === currentWord.length){
      score++;
      combo++;
      if(mode==="challenge" && combo%10===0){
        time+=5;
        alert("コンボボーナス！+5秒");
      }
      document.getElementById("score").textContent="スコア:"+score;
      document.getElementById("combo").textContent="コンボ:"+combo;
      newWord();
    }
  } else {
    e.target.value = val.slice(0,charIndex);
    combo=0;
    document.getElementById("combo").textContent="コンボ:"+combo;
    document.getElementById("word").className="wrongEffect";
    setTimeout(()=>{document.getElementById("word").className="";},150);
    if(!mistakes.includes(currentWord)) mistakes.push(currentWord);
  }
});

// スペースキーでゲーム開始
document.addEventListener("keydown", function(event){
  if(!timerRunning && event.code==="Space" && document.getElementById("gameArea").style.display==="block"){
    timerRunning=true;
    document.getElementById("input").disabled=false;
    document.getElementById("startHint").style.display="none";
    newWord();
    intervalID=setInterval(countdown,1000);
  }
});

// タイマー
function countdown(){
  time--;
  document.getElementById("timer").textContent="残り時間:"+time;
  if(time<=0){
    clearInterval(intervalID);
    document.getElementById("gameArea").style.display="none";
    document.getElementById("reviewArea").style.display="block";
    let listElem = document.getElementById("mistakesList");
    listElem.innerHTML="";
    mistakes.forEach(word=>{ let li=document.createElement("li"); li.textContent=word; listElem.appendChild(li);});
    alert("終了！スコア:"+score);
  }
}

// SNSシェア
function shareLINE(){
  let text = encodeURIComponent(`英単語タイピングスコア: ${score}点！今日のチャレンジもクリア！`);
  window.open(`https://line.me/R/msg/text/?${text}`);
}
function shareX(){
  let text = encodeURIComponent(`英単語タイピングスコア: ${score}点！今日のチャレンジもクリア！`);
  window.open(`https://twitter.com/intent/tweet?text=${text}`);
}
function shareCopy(){
  let text = `英単語タイピングスコア: ${score}点！今日のチャレンジもクリア！`;
  navigator.clipboard.writeText(text).then(()=>{ alert("スコアをコピーしました！"); });
}

// 再プレイ
function restartGame(){
  mistakes=[]; score=0; combo=0;
  document.getElementById("reviewArea").style.display="none";
  document.getElementById("setupArea").style.display="block";
}
</script>

</body>
</html>
