<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>英単語タイピング 完全進化版</title>
<style>
body{ text-align:center; font-family:sans-serif; margin:0; background:linear-gradient(#a1c4fd,#c2e9fb);}
h1{ font-size:40px; margin:10px;}
#word{ font-size:50px; margin:20px; color:#007acc;}
input{ font-size:28px; padding:10px; width:80%; max-width:400px; text-align:center;}
button{ font-size:22px; padding:10px 20px; margin:10px; border-radius:10px;}
#gameArea,#resultArea{ display:none;}
.stat{ font-size:22px; margin:5px;}
</style>
</head>
<body>

<h1>英単語タイピング</h1>

<div id="setupArea">
  <button onclick="prepareGame()">スタート準備</button>
</div>

<div id="gameArea">
  <div id="countdown"></div>
  <div id="timer">60</div>
  <div id="score">0</div>
  <div id="word">...</div>
  <input id="input" disabled>
</div>

<div id="resultArea">
  <h2>結果</h2>
  <div class="stat" id="finalScore"></div>
  <div class="stat" id="accuracy"></div>
  <div class="stat" id="wpm"></div>
  <div class="stat" id="rank"></div>
  <button onclick="location.reload()">もう一度</button>
</div>

<script>
let words=["apple","banana","orange","grape","melon","peach"];
let current="",score=0,time=60,correct=0,total=0;
let interval;

function prepareGame(){
  document.getElementById("setupArea").style.display="none";
  document.getElementById("gameArea").style.display="block";
  startCountdown();
}

function startCountdown(){
  let c=3;
  let el=document.getElementById("countdown");
  let timer=setInterval(()=>{
    el.textContent=c>0?c:"GO!";
    c--;
    if(c<-1){
      clearInterval(timer);
      el.textContent="";
      startGame();
    }
  },1000);
}

function startGame(){
  document.getElementById("input").disabled=false;
  nextWord();
  interval=setInterval(()=>{
    time--;
    document.getElementById("timer").textContent=time;
    if(time<=0) endGame();
  },1000);
}

function nextWord(){
  current=words[Math.floor(Math.random()*words.length)];
  document.getElementById("word").textContent=current;
  document.getElementById("input").value="";
}

document.getElementById("input").addEventListener("input",e=>{
  let val=e.target.value;
  total++;
  if(val===current){
    score++;
    correct++;
    nextWord();
  }
  document.getElementById("score").textContent=score;
});

function endGame(){
  clearInterval(interval);
  document.getElementById("gameArea").style.display="none";
  document.getElementById("resultArea").style.display="block";

  let acc=Math.round((correct/total)*100)||0;
  let wpm=Math.round(score/(60-time)*60)||0;

  let rank="C";
  if(score>20) rank="B";
  if(score>30) rank="A";
  if(score>40) rank="S";

  document.getElementById("finalScore").textContent="スコア: "+score;
  document.getElementById("accuracy").textContent="正確率: "+acc+"%";
  document.getElementById("wpm").textContent="WPM: "+wpm;
  document.getElementById("rank").textContent="ランク: "+rank;
}
</script>

</body>
</html>
