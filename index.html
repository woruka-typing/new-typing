<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>英単語タイピング 神ゲー版</title>
<style>
body{ text-align:center; font-family:sans-serif; margin:0; background:#f0f8ff;}
h1{ font-size:50px; margin:20px;}
#word{ font-size:60px; margin:20px; color:#007acc;}
input,select,button{ font-size:24px; padding:10px; margin:10px;}
#gameArea,#resultArea{ display:none;}
#countdown{ font-size:70px; color:red;}
#score,#combo,#timer{ font-size:30px; margin:10px;}

/* エフェクト */
.flash{ animation:flash 0.2s;}
@keyframes flash{
0%{background:#fff;}
50%{background:#b6ffb6;}
100%{background:#fff;}
}

.shake{ animation:shake 0.2s;}
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}
</style>
</head>
<body>

<h1>英単語タイピング</h1>

<div id="setupArea">
<select id="level">
<option value="easy">初級</option>
<option value="medium">中級</option>
<option value="hard">上級</option>
</select>
<button onclick="prepareGame()">スタート準備</button>
</div>

<div id="gameArea">
<div id="countdown"></div>
<div id="timer">60</div>
<div id="score">0</div>
<div id="combo">0</div>
<div id="word">...</div>
<input id="input" disabled>
</div>

<div id="resultArea">
<h2 id="resultText"></h2>
<button onclick="location.reload()">もう一回</button>
<button onclick="shareX()">Xでシェア</button>
</div>

<script>
let words={
easy:["cat","dog","run","eat","play","book"],
medium:["apple","orange","banana","grape","school"],
hard:["development","environment","challenge","performance"]
};

let current="",score=0,combo=0,time=60,charIndex=0;
let interval,timerRunning=false;

const okSound=new Audio("https://www.soundjay.com/button/sounds/button-4.mp3");
const ngSound=new Audio("https://www.soundjay.com/button/sounds/button-10.mp3");

function prepareGame(){
document.getElementById("setupArea").style.display="none";
document.getElementById("gameArea").style.display="block";
startCountdown();
}

function startCountdown(){
let c=3;
let el=document.getElementById("countdown");
let t=setInterval(()=>{
el.textContent=c>0?c:"GO!";
c--;
if(c<-1){
clearInterval(t);
el.textContent="";
startGame();
}
},1000);
}

function startGame(){
document.getElementById("input").disabled=false;
document.getElementById("input").focus();
nextWord();
interval=setInterval(()=>{
time--;
document.getElementById("timer").textContent=time;
if(time<=0) endGame();
},1000);
}

function nextWord(){
let level=document.getElementById("level").value;
let list=words[level];
current=list[Math.floor(Math.random()*list.length)];
charIndex=0;
document.getElementById("word").textContent=current;
document.getElementById("input").value="";
}

document.getElementById("input").addEventListener("input",e=>{
let val=e.target.value;
let wordEl=document.getElementById("word");

if(val[charIndex]===current[charIndex]){
charIndex++;

wordEl.classList.add("flash");
okSound.currentTime=0;
okSound.play();
setTimeout(()=>wordEl.classList.remove("flash"),200);

if(charIndex===current.length){
score++;
combo++;

if(combo>=10){wordEl.style.color="gold";}
else if(combo>=5){wordEl.style.color="orange";}
else{wordEl.style.color="#007acc";}

document.getElementById("score").textContent=score;
document.getElementById("combo").textContent=combo;

nextWord();
}

}else{
e.target.value=val.slice(0,charIndex);
combo=0;

wordEl.classList.add("shake");
ngSound.currentTime=0;
ngSound.play();
setTimeout(()=>wordEl.classList.remove("shake"),200);

document.getElementById("combo").textContent=combo;
}
});

function endGame(){
clearInterval(interval);
document.getElementById("gameArea").style.display="none";
document.getElementById("resultArea").style.display="block";

let rank="C";
if(score>10)rank="B";
if(score>20)rank="A";
if(score>30)rank="S";

let msg=`お前 ${rank}ランク`;
if(rank==="A") msg+="。あと少しでSだったぞ";
if(rank==="B") msg+="。まだ伸びるぞ";
if(rank==="S") msg+="。強すぎ";

document.getElementById("resultText").textContent=msg+"（"+score+"点）";
}

function shareX(){
let text=encodeURIComponent(`英単語タイピングで${score}点取った。お前は？`);
window.open(`https://twitter.com/intent/tweet?text=${text}`);
}
</script>

</body>
</html>
